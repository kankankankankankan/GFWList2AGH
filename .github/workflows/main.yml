name: Build & Release GFWList2AGH (Custom)

on:
    push:
        branches:
          - main
    schedule:
        - cron: "2 0 * * *"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ 拉你自己的仓库（关键）
            - name: Checkout self repo
              uses: actions/checkout@v4

            # 2️⃣ 赋予执行权限
            - name: Prepare script
              run: |
                  chmod +x release.sh

            # 3️⃣ 执行你自己的 release.sh（核心）
            - name: Run custom release.sh
              run: |
                  bash release.sh

            # 4️⃣ 调试用（建议保留一次）
            - name: Debug output
              run: |
                  echo "==== OUTPUT FILES ===="
                  ls -R

            # 5️⃣ 提交结果
            - name: Push result
              run: |
                  curl -s "https://raw.githubusercontent.com/kankankankankan/Toolkit/main/Git.sh" > /tmp/Git.sh
                  bash /tmp/Git.sh \
                      -u "kankankankankan" \
                      -e "king@hotmail.com" \
                      -f "." \
                      -r "GFWList2AGH" \
                      -i "Generated by GitHub Actions" \
                      -m "push"
